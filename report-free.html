<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>天赋报告 · 生命数字</title>
<meta name="description" content="查看孩子的彩虹天赋罗盘和生命数字报告">
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
<link rel="stylesheet" href="src/css/common.css">
<style>
  .report-header {
    text-align: center;
    padding: 36px 20px 4px;
    position: relative;
    z-index: var(--z-content);
  }
  .report-header .child-name {
    font-family: var(--font-display);
    font-size: 28px;
    color: var(--text-primary);
  }
  .report-header .birth-info {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .decor-svg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: var(--z-decor);
  }

  /* ═══ Personality card (replaces mini compass) ═══ */
  .personality-card {
    margin: 16px 16px 12px;
    padding: 28px 20px 24px;
    border-radius: var(--radius-card);
    text-align: center;
    position: relative;
    z-index: var(--z-content);
    box-shadow: 0 2px 12px rgba(58,46,46,0.05);
  }
  .personality-title {
    font-family: var(--font-display);
    font-size: 24px;
    color: var(--text-primary);
    line-height: 1.35;
  }
  .personality-subtitle {
    font-family: var(--font-body);
    font-size: 12px;
    color: #A8917A;
    margin-top: 6px;
  }
  .personality-avatar {
    width: 140px; height: 140px;
    margin: 20px auto 16px;
  }
  .personality-avatar svg {
    width: 100%; height: 100%;
  }
  .personality-energy {
    font-size: 14px;
    color: #3A2E2E;
    line-height: 1.6;
    max-width: 280px;
    margin: 0 auto;
  }

  /* ═══ Grid wrapper for SVG overlay ═══ */
  .num-grid-wrapper {
    position: relative;
    width: 100%;
    max-width: 280px;
    margin: 0 auto;
  }
  .num-grid-lines {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }
  .num-grid-cell.present .cell-dot {
    position: relative;
    z-index: 2;
  }

  .analysis-divider {
    display: flex; align-items: center; gap: 8px;
    margin: 16px 24px;
    position: relative; z-index: var(--z-content);
  }
  .analysis-divider .divider-line { flex: 1; height: 1px; background: var(--border); }
  .analysis-divider .divider-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

  /* ═══ Loading overlay ═══ */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--bg-page);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999;
    transition: opacity 0.35s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--c2);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  .loading-text { margin-top: 16px; font-size: 14px; color: var(--text-muted); }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ═══ BaZi Module ═══ */
  .bazi-section { position: relative; z-index: var(--z-content); }
  /* ═══ Pillars Row (replaces table) ═══ */
  .bazi-pillars-row { display: flex; gap: 8px; justify-content: center; margin: 8px 0 4px; }
  .pillar-col { flex: 1; min-width: 0; text-align: center; }
  .pillar-name { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .pillar-day { position: relative; }
  .pillar-day::before { content: '日主'; position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 9px; color: #FF6B6B; background: #FFF0F0; padding: 1px 8px; border-radius: 100px; white-space: nowrap; }
  .pillar-placeholder { opacity: 0.45; }
  .bazi-daymaster { text-align: center; font-size: 13px; color: var(--text-secondary); margin-top: 10px; }
  .bazi-daymaster strong { color: var(--text-primary); font-family: var(--font-display); font-size: 18px; }

  .wuxing-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .wuxing-label { width: 24px; font-size: 16px; text-align: center; flex-shrink: 0; color: var(--text-primary); }
  .wuxing-bar-track { flex: 1; height: 8px; background: #EDE0D5; border-radius: 4px; overflow: hidden; }
  .wuxing-bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease-out; }
  .wuxing-count { width: 28px; font-size: 14px; font-weight: 600; color: var(--text-primary); text-align: center; flex-shrink: 0; }
  .wuxing-tag { font-size: 11px; padding: 2px 10px; border-radius: var(--radius-btn); flex-shrink: 0; white-space: nowrap; }
  .wuxing-tag.strong { background: #FFF0F0; color: #FF6B6B; }
  .wuxing-tag.missing { background: #F0F0FF; color: #4D96FF; }

  .geju-badge { display: inline-block; font-family: var(--font-display); font-size: 22px; background: linear-gradient(135deg, #F0EBFF, #E5D9FF); padding: 6px 22px; border-radius: var(--radius-btn); margin-bottom: 12px; }
  .geju-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.65; margin-bottom: 10px; }
  .geju-tip { font-size: 13px; color: #8C7A6B; background: var(--bg-warm); padding: 10px 14px; border-radius: var(--radius-tag); line-height: 1.6; }

  .bazi-link-item + .bazi-link-item { border-top: 1px solid var(--border); margin-top: 12px; padding-top: 12px; }
  .bazi-link-double { background: linear-gradient(135deg, #FFF5F5, #FFF0F0); border-radius: var(--radius-tag); padding: 14px; margin-bottom: 10px; }
  .bazi-link-double .double-badge { display: inline-block; font-size: 11px; font-weight: 600; color: #FF6B6B; background: #FFE8E8; padding: 2px 12px; border-radius: var(--radius-btn); margin-bottom: 8px; }
  .bazi-link-double .double-text { font-size: 14px; color: var(--text-secondary); line-height: 1.65; }
  .bazi-link-general { font-size: 13px; color: var(--text-secondary); line-height: 1.65; }

  /* BaZi placeholder (no hour) */
  .bazi-placeholder { opacity: 0.4; border: 1.5px dashed #F5E0C8; border-radius: var(--radius-tag); padding: 10px 6px; text-align: center; }
  .bazi-placeholder-gan, .bazi-placeholder-zhi { display: block; font-family: var(--font-display); font-size: 26px; color: #C4A882; line-height: 1.2; }
  .bazi-placeholder-label { display: block; font-size: 9px; color: #C4A882; margin-top: 4px; }
  .bazi-placeholder-hint { display: block; font-size: 9px; color: #C4A882; }
  .bazi-hour-warning { background: #FFF8E0; border-radius: 10px; padding: 8px 12px; margin-top: 10px; font-size: 11px; color: #8A6200; text-align: center; }
  .bazi-notes { font-size: 11px; color: var(--text-muted); line-height: 1.6; margin-top: 16px; padding: 0 4px; }

  /* ═══ Strength & XiJi Card ═══ */
  .bazi-strength-card { border-radius: var(--radius-card); padding: 24px 20px 20px; text-align: center; margin-top: 0; }
  .bazi-strength-avatar { width: 120px; height: 120px; margin: 0 auto 12px; }
  .bazi-strength-avatar svg { width: 100%; height: 100%; }
  .bazi-strength-label { font-family: var(--font-display); font-size: 20px; color: var(--text-primary); margin-bottom: 2px; }
  .bazi-strength-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .bazi-strength-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.6; max-width: 260px; margin: 0 auto; }
  .bazi-xiji-divider { width: 100%; height: 1px; background: var(--border); margin: 16px 0; }
  .bazi-xiji-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
  .bazi-xiji-row-label { font-size: 13px; color: var(--text-secondary); white-space: nowrap; padding-top: 6px; min-width: 52px; text-align: right; }
  .bazi-xiji-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .bazi-xiji-tag { display: inline-flex; align-items: center; gap: 4px; padding: 6px 14px; border-radius: var(--radius-btn); font-size: 14px; font-weight: 500; }
  .bazi-xiji-tag.xi { background: #F0FBF2; color: #2E7D3A; }
  .bazi-xiji-tag.ji { background: #FFF0F0; color: #C0392B; }
  .bazi-xiji-meaning { font-size: 13px; color: #8C7A6B; line-height: 1.7; margin-top: 14px; padding: 12px 14px; background: var(--bg-warm); border-radius: var(--radius-tag); }

  /* ═══ Missing BaZi-linked cards ═══ */
  .missing-bazi { display: block; padding: 18px 16px; margin-bottom: 12px; }
  .missing-bazi-header { margin-bottom: 12px; display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
  .missing-bazi-tag { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: var(--radius-btn); background: #E8F0FF; color: #4D96FF; white-space: nowrap; }
  .missing-bazi-tag.double { background: #FFE8E8; color: #FF6B6B; }
  .missing-bazi-title { font-family: var(--font-display); font-size: 16px; color: var(--text-primary); }
  .missing-bazi-sign { background: var(--bg-warm); border-radius: var(--radius-tag); padding: 12px 14px; margin-bottom: 14px; }
  .missing-sign-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .missing-sign-text { font-size: 14px; color: var(--text-secondary); line-height: 1.65; }
  .missing-bazi-fixes {  }
  .missing-fixes-label { font-size: 12px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }
  .missing-fixes-list { padding: 0; margin: 0; list-style: none; }
  .missing-fixes-list li { font-size: 13px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 8px; padding-left: 4px; }

  /* ═══ Contact Mode Card ═══ */
  .contact-mode-card {  }
  .contact-mode-why { font-size: 13px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 14px; }
  .contact-mode-core { font-size: 16px; color: var(--text-primary); line-height: 1.5; margin-bottom: 14px; }
  .contact-mode-scenes-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
  .contact-scenes-list { padding: 0; margin: 0; list-style: none; counter-reset: scene; }
  .contact-scene { font-size: 13px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 12px; padding-left: 4px; }
</style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <p class="loading-text">正在计算天赋密码...</p>
</div>
<div class="page" id="pageRoot">

  <svg class="decor-svg" viewBox="0 0 430 1400" preserveAspectRatio="xMidYMin slice" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="100" r="90" fill="#FF9F43" opacity="0.06"/>
    <circle cx="380" cy="400" r="100" fill="#FF6B6B" opacity="0.05"/>
    <circle cx="30" cy="700" r="80" fill="#6BCB77" opacity="0.05"/>
    <circle cx="370" cy="950" r="100" fill="#9B72CF" opacity="0.05"/>
    <circle cx="60" cy="1200" r="80" fill="#4D96FF" opacity="0.05"/>
  </svg>

  <div class="report-header">
    <div class="child-name" id="childNameDisplay"></div>
    <div class="birth-info" id="birthInfoDisplay"></div>
  </div>

  <!-- ═══ Part 1: 人格展示区（替换旧罗盘） ═══ -->
  <div id="personalityRoot"></div>

  <!-- ═══════════════════════════
       第一层：九宫格数字盘
       ═══════════════════════════ -->
  <div class="section-header anim-fade-up stagger-1">
    <span class="section-icon" id="secIcon1">▦</span>
    <span class="section-title">数字能量盘</span>
  </div>
  <div class="card anim-fade-up stagger-1">
    <div class="num-grid-wrapper" id="numGridWrapper">
      <div class="num-grid" id="numGrid"></div>
    </div>
    <div class="grid-tag-row" id="gridTags"></div>
  </div>

  <!-- ═══════════════════════════
       第二层：数字连线能量
       ═══════════════════════════ -->
  <div id="connectionsSection" style="display:none;">
    <div class="section-header anim-fade-up stagger-2">
      <span class="section-icon" id="secIcon2">◎</span>
      <span class="section-title">数字连线·形成的独特能量</span>
    </div>
    <div class="card anim-fade-up stagger-2" id="connectionsCard"></div>
  </div>

  <!-- ═══════════════════════════
       第三层：缺失数字分析
       ═══════════════════════════ -->
  <div class="section-header anim-fade-up stagger-3">
    <span class="section-icon" style="background:var(--c2);">!</span>
    <span class="section-title">需要重点培养的能力</span>
  </div>
  <div class="card-highlight anim-fade-up stagger-3" id="missingSection"></div>

  <!-- ═══════════════════════════
       BaZi: 四柱八字解读
       ═══════════════════════════ -->
  <div id="baziSection" style="display:none;"></div>

  <!-- ═══ 先天性格 ═══ -->
  <div class="section-header anim-fade-up stagger-4">
    <span class="section-icon" id="secIcon4">♥</span>
    <span class="section-title">先天性格</span>
  </div>
  <div class="card anim-fade-up stagger-4">
    <p class="body-text" id="personalityText"></p>
  </div>

  <!-- ═══ 天生优势 ═══ -->
  <div class="section-header anim-fade-up stagger-5">
    <span class="section-icon" id="secIcon5">★</span>
    <span class="section-title">天生就比别人强的地方</span>
  </div>
  <div class="card anim-fade-up stagger-5">
    <ul class="strength-list" id="strengthList"></ul>
  </div>

  <!-- ═══ 养育指引 ═══ -->
  <div class="section-header anim-fade-up stagger-6">
    <span class="section-icon" id="secIcon6">☀</span>
    <span class="section-title">妈妈今天就能用的3个方法</span>
  </div>
  <div class="card anim-fade-up stagger-6">
    <ol class="tips-list" id="tipsList"></ol>
  </div>

  <!-- ═══ 付费解锁 ═══ -->
  <div class="paywall-card anim-fade-up stagger-7">
    <div class="paywall-title">解锁完整成长方案</div>
    <div class="paywall-price">¥29</div>
    <p class="caption" style="margin-top:2px;">一次购买，永久可看</p>
    <ul class="paywall-list">
      <li>完整能量罗盘（六维天赋雷达图）</li>
      <li>流年解读·今年按季度养育重点</li>
      <li>亲子合盘·和妈妈的相处密码</li>
      <li>缺失数字强化·具体活动推荐清单</li>
    </ul>
    <button class="btn-pay" id="btnUnlock" style="display:block;width:calc(100% - 32px);margin:0 16px;background:var(--btn-gradient);box-shadow:var(--btn-shadow);border-radius:var(--radius-btn);color:#fff;font-size:16px;font-weight:500;font-family:var(--font-body);padding:16px 24px;border:none;cursor:pointer;">¥29 立即解锁</button>
    <p class="caption mt-12">购买后联系微信获取完整报告</p>
  </div>

</div>

<script src="src/data/calculator.js"></script>
<script src="src/data/content.js"></script>
<script src="src/data/avatars.js"></script>
<script src="src/data/bazi.js"></script>
<script src="src/data/deepContent.js"></script>
<script src="src/data/voice.js"></script>
<script src="src/data/avatarsBazi.js"></script>
<script src="src/js/common.js"></script>
<script>
(function() {
  var loadingEl = document.getElementById('loadingOverlay');
  function hideLoading() {
    if (loadingEl) { loadingEl.classList.add('hidden'); }
  }

  var p = getParams();

  var childName = p.c_name || p.name;
  var childYear = p.c_year || p.year;
  var childMonth = p.c_month || p.month;
  var childDay = p.c_day || p.day;
  var childGender = p.c_gender || p.gender;

  if (!childName || !childYear || !childMonth || !childDay) {
    hideLoading();
    document.getElementById('pageRoot').innerHTML =
      '<div class="page" style="display:flex;align-items:center;justify-content:center;text-align:center;">' +
      '<div><p class="body-text">缺少参数，请从输入页重新进入</p>' +
      '<a href="input.html" class="btn-small mt-24">开始测试</a></div></div>';
    return;
  }

  var lifeNum = calcLifeNumber(childYear, childMonth, childDay);
  var numData = NUMBER_COLORS[lifeNum];
  var content = getContent(lifeNum);
  var freq = countDigitFrequency(childYear, childMonth, childDay);
  var missingNums = calcMissingNumbers(childYear, childMonth, childDay);
  var connections = getConnections(freq);
  var iconColor = numData ? numData.color : '#FF6B6B';

  // ═══ BaZi computation ═══
  var baziData = null;
  var wuXingData = null;
  var gejuData = null;
  var baziLinks = [];
  var dayMasterWX = '';
  var GAN_WX = {甲:'木',乙:'木',丙:'火',丁:'火',戊:'土',己:'土',庚:'金',辛:'金',壬:'水',癸:'水'};
  try {
    if (typeof Lunar !== 'undefined') {
      baziData = calcBazi(childYear, childMonth, childDay, p.c_hour);
      wuXingData = calcWuXing(baziData);
      gejuData = calcGeJu(baziData, wuXingData);
      baziLinks = getBaziNumberLink(wuXingData, missingNums);
      dayMasterWX = GAN_WX[baziData.dayMaster] || '';
      // Store for other pages
      try { sessionStorage.setItem('dayMasterWX', dayMasterWX); } catch(e) {}
    }
  } catch(e) {
    console.warn('BaZi:', e);
  }

  // ═══ Strength & XiJi computation ═══
  var strengthData = null;
  var xijiData = null;
  var baziAvatarKey = '';
  var dayWxColor = '#FFD93D';
  var WX_COLORS = {木:'#6BCB77',火:'#FF6B6B',土:'#FFD93D',金:'#C4A882',水:'#4D96FF'};
  try {
    if (baziData) {
      strengthData = calcStrength(baziData);
      xijiData = calcXiJi(dayMasterWX, strengthData.isStrong);
      baziAvatarKey = baziData.dayMaster + '-' + (strengthData.isStrong ? '强' : '弱');
      dayWxColor = WX_COLORS[dayMasterWX] || '#FFD93D';
    }
  } catch(e) {
    console.warn('Strength/XiJi calc:', e);
  }

  // ═══ Voice texts ═══
  var openingText = (typeof genFullOpening === 'function')
    ? genFullOpening(childName, lifeNum, missingNums.length, dayMasterWX, childGender, baziLinks)
    : (content ? content.coreDesc : '');

  // ═══ Header ═══
  document.getElementById('childNameDisplay').textContent = childName;
  document.getElementById('birthInfoDisplay').textContent =
    childYear + '年' + childMonth + '月' + childDay + '日';

  // ═══ Part 1: Personality Card ═══
  (function renderPersonalityCard() {
    var root = document.getElementById('personalityRoot');
    var color = numData.color;
    var name = numData.name;
    var personalityName = numData.personality || (lifeNum + '号');
    var avatar = getAvatar(lifeNum);
    var coreDesc = openingText || (content ? content.coreDesc : '');

    root.innerHTML =
      '<div class="personality-card anim-fade-up" style="background: linear-gradient(135deg, ' + color + '18, ' + color + '0A);">' +
        '<h1 class="personality-title">' + childName + ' 是 ' + lifeNum + '号 · ' + personalityName + '</h1>' +
        '<p class="personality-subtitle">' + name + '能量 · ' + numData.theme + '</p>' +
        '<div class="personality-avatar">' + avatar + '</div>' +
        '<p class="personality-energy">' + coreDesc + '</p>' +
      '</div>';
  })();

  // Section icon colors
  var icons = ['secIcon1', 'secIcon2', 'secIcon4', 'secIcon5', 'secIcon6'];
  for (var ii = 0; ii < icons.length; ii++) {
    var el = document.getElementById(icons[ii]);
    if (el) el.style.background = iconColor;
  }

  if (!content) {
    document.getElementById('personalityText').textContent = '数据加载中，请稍后再试。';
    hideLoading();
    return;
  }

  // ═══ Layer 1: 3×3 Number Grid + SVG overlay ═══
  (function renderGrid() {
    var html = '';
    for (var n = 1; n <= 9; n++) {
      var count = freq[n] || 0;
      if (count > 0) {
        var nc = NUMBER_COLORS[n];
        html += '<div class="num-grid-cell present">' +
                  '<div class="cell-dot" style="background:' + nc.color + ';">' +
                    '<span class="cell-num" style="color:#fff;">' + n + '</span>' +
                  '</div>' +
                  '<span class="cell-count">×' + count + '</span>' +
                '</div>';
      } else {
        html += '<div class="num-grid-cell missing">' +
                  '<span class="cell-num">' + n + '</span>' +
                  '<span class="cell-label">缺失</span>' +
                '</div>';
      }
    }
    document.getElementById('numGrid').innerHTML = html;

    // Draw SVG connection lines on grid
    if (connections.length > 0) {
      var wrapper = document.getElementById('numGridWrapper');
      var svgNS = 'http://www.w3.org/2000/svg';
      var svg = document.createElementNS(svgNS, 'svg');
      svg.setAttribute('class', 'num-grid-lines');
      svg.setAttribute('viewBox', '0 0 280 280');
      svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

      function cellCenter(num) {
        var pos = GRID_POS[num];
        return {
          x: pos.col * 96 + 44,
          y: pos.row * 96 + 44
        };
      }

      var defs = document.createElementNS(svgNS, 'defs');
      var gradDone = {};

      for (var ci = 0; ci < connections.length; ci++) {
        var conn = connections[ci];
        var gid = 'g-' + Math.min(conn.from, conn.to) + '-' + Math.max(conn.from, conn.to);
        if (gradDone[gid]) continue;
        gradDone[gid] = true;

        var grad = document.createElementNS(svgNS, 'linearGradient');
        grad.setAttribute('id', gid);
        var fromC = cellCenter(conn.from);
        var toC = cellCenter(conn.to);
        grad.setAttribute('x1', fromC.x);
        grad.setAttribute('y1', fromC.y);
        grad.setAttribute('x2', toC.x);
        grad.setAttribute('y2', toC.y);
        grad.setAttribute('gradientUnits', 'userSpaceOnUse');

        var s1 = document.createElementNS(svgNS, 'stop');
        s1.setAttribute('offset', '0%');
        s1.setAttribute('stop-color', NUMBER_COLORS[conn.from].color);
        s1.setAttribute('stop-opacity', '0.75');
        var s2 = document.createElementNS(svgNS, 'stop');
        s2.setAttribute('offset', '100%');
        s2.setAttribute('stop-color', NUMBER_COLORS[conn.to].color);
        s2.setAttribute('stop-opacity', '0.75');

        grad.appendChild(s1);
        grad.appendChild(s2);
        defs.appendChild(grad);
      }
      svg.appendChild(defs);

      for (var cj = 0; cj < connections.length; cj++) {
        var conn2 = connections[cj];
        var from = cellCenter(conn2.from);
        var to = cellCenter(conn2.to);
        var gid2 = 'g-' + Math.min(conn2.from, conn2.to) + '-' + Math.max(conn2.from, conn2.to);

        var line = document.createElementNS(svgNS, 'line');
        line.setAttribute('x1', from.x);
        line.setAttribute('y1', from.y);
        line.setAttribute('x2', to.x);
        line.setAttribute('y2', to.y);
        line.setAttribute('stroke', 'url(#' + gid2 + ')');
        line.setAttribute('stroke-width', '2');
        line.setAttribute('stroke-dasharray', '4 3');
        line.setAttribute('stroke-linecap', 'round');
        line.setAttribute('opacity', '0.6');
        svg.appendChild(line);
      }

      wrapper.appendChild(svg);
    }

    // Tags row
    var presentNums = [];
    var missingTagNums = [];
    for (var nn = 1; nn <= 9; nn++) {
      if ((freq[nn] || 0) > 0) presentNums.push(nn);
      else missingTagNums.push(nn);
    }
    var tagHtml = '';
    if (presentNums.length > 0) {
      tagHtml += '<span class="grid-tag-label green">已有</span>';
      for (var pk = 0; pk < presentNums.length; pk++) {
        var pc = NUMBER_COLORS[presentNums[pk]];
        tagHtml += '<span class="grid-tag" style="background:' + pc.color + ';">' + presentNums[pk] + '</span>';
      }
    }
    if (missingTagNums.length > 0) {
      tagHtml += '<span class="grid-tag-label red">缺失</span>';
      for (var mt = 0; mt < missingTagNums.length; mt++) {
        tagHtml += '<span class="grid-tag missing-tag">' + missingTagNums[mt] + '</span>';
      }
    }
    document.getElementById('gridTags').innerHTML = tagHtml;
  })();

  // ═══ Layer 2: Connections ═══
  (function renderConnections() {
    if (connections.length === 0) {
      document.getElementById('connectionsSection').style.display = 'none';
      return;
    }
    document.getElementById('connectionsSection').style.display = '';

    var html = '';
    for (var ci = 0; ci < connections.length; ci++) {
      var conn = connections[ci];
      var isTriple = conn.type.indexOf('triple') === 0;
      var meaning;
      if (isTriple) {
        var tripleKey = conn.type.replace('triple-', '').split('').join('-');
        meaning = getTripleConnection(tripleKey);
      } else {
        meaning = getConnection(conn.from, conn.to);
      }
      if (!meaning) continue;

      var fromColor = NUMBER_COLORS[conn.from].color;
      var toColor = NUMBER_COLORS[conn.to].color;

      html += '<div class="connection-item' + (isTriple ? ' connection-triple' : '') + '">' +
                '<div class="connection-tags">' +
                  '<span class="connection-num-tag" style="background:' + fromColor + ';">' + conn.from + '</span>' +
                  '<span class="connection-arrow">→</span>' +
                  '<span class="connection-num-tag" style="background:' + toColor + ';">' + conn.to + '</span>' +
                '</div>' +
                '<div class="connection-info">' +
                  '<div class="connection-name">' + (meaning.isGolden ? '✨ ' : '') + meaning.title + '</div>' +
                  '<div class="connection-desc">' + meaning.desc + '</div>' +
                '</div>' +
              '</div>';
    }
    document.getElementById('connectionsCard').innerHTML = html || '<p class="body-text text-center">暂无显著连线</p>';
  })();

  // ═══ Layer 3: BaZi-Number Linked Missing Analysis ═══
  (function renderMissing() {
    var wxOrder = ['木','火','土','金','水'];
    var hasMissingWX = false;
    var linkedItems = [];

    if (wuXingData) {
      for (var wi = 0; wi < wxOrder.length; wi++) {
        var wx = wxOrder[wi];
        if (wuXingData.count[wx] === 0) {
          hasMissingWX = true;
          var link = (typeof genBaziNumberLink === 'function')
            ? genBaziNumberLink(childName, childGender, wx, lifeNum)
            : null;
          if (link) linkedItems.push(link);
        }
      }
    }

    if (!hasMissingWX || linkedItems.length === 0) {
      // Fallback to old behavior or show balanced
      if (missingNums.length === 0) {
        document.getElementById('missingSection').innerHTML =
          '<div class="missing-balanced">' +
            '<span class="balanced-icon">🌈</span>' +
            '<p class="balanced-text">孩子的数字能量和五行能量都完整，<br>各方面均衡发展，这是非常难得的配置。</p>' +
          '</div>';
      } else {
        // Use voice.js or generic for missing numbers only
        var fallbackHtml = '';
        for (var mn = 0; mn < missingNums.length; mn++) {
          var num = missingNums[mn];
          var nc = NUMBER_COLORS[num];
          var desc = (typeof genMissingDesc === 'function')
            ? genMissingDesc(childName, lifeNum, num, childGender)
            : '缺失' + num + '号数字，代表一种潜在的成长课题。';
          fallbackHtml +=
            '<div class="missing-item">' +
              '<div class="missing-num-badge" style="background:' + nc.color + ';">' + num + '</div>' +
              '<div class="missing-num-body">' +
                '<p class="missing-num-desc">' + desc + '</p>' +
              '</div>' +
            '</div>';
        }
        document.getElementById('missingSection').innerHTML = fallbackHtml;
      }
      return;
    }

    var wxEmoji = {木:'🌱',火:'🔥',土:'🌍',金:'⚡',水:'💧'};
    var html = '';
    for (var li = 0; li < linkedItems.length; li++) {
      var item = linkedItems[li];
      var fixesHtml = '';
      for (var fi = 0; fi < item.fixes.length; fi++) {
        fixesHtml += '<li>' + (fi + 1) + '. ' + item.fixes[fi] + '</li>';
      }

      html +=
        '<div class="missing-item missing-bazi">' +
          '<div class="missing-bazi-header">' +
            '<span class="missing-bazi-tag' + (item.isDoubleConfirm ? ' double' : '') + '">' +
              (item.isDoubleConfirm ? '🔴 双重印证' : '🔵 互补参考') +
            '</span>' +
            '<span class="missing-bazi-title">八字缺' + item.missingWX + ' ' + wxEmoji[item.missingWX] + ' × 生命数字缺' + item.relatedNum + '号</span>' +
          '</div>' +
          '<div class="missing-bazi-sign">' +
            '<p class="missing-sign-label">你可能注意到：</p>' +
            '<p class="missing-sign-text">"' + item.sign + '"</p>' +
          '</div>' +
          '<div class="missing-bazi-fixes">' +
            '<p class="missing-fixes-label">这样补最有效：</p>' +
            '<ol class="missing-fixes-list">' + fixesHtml + '</ol>' +
          '</div>' +
        '</div>';
    }
    document.getElementById('missingSection').innerHTML = html;
  })();

  // ═══════════════════════════
  //  BaZi Section (5 sub-modules)
  // ═══════════════════════════
  (function renderBaziSection() {
    if (!baziData || !wuXingData || !gejuData) return;
    var section = document.getElementById('baziSection');
    section.style.display = '';

    var wxColors = {木:'#6BCB77',火:'#FF6B6B',土:'#FFB830',金:'#FFD93D',水:'#4D96FF'};
    var wxOrder = ['木','火','土','金','水'];
    var maxCount = 0;
    for (var wi = 0; wi < wxOrder.length; wi++) {
      if (wuXingData.count[wxOrder[wi]] > maxCount) maxCount = wuXingData.count[wxOrder[wi]];
    }
    if (maxCount === 0) maxCount = 1;

    // 1. Pillars — per-column gan/zhi blocks with十神
    var hasHour = baziData.hasHour;
    var dayGan = baziData.dayMaster;
    var plColors = {木:'#6BCB77',火:'#FF6B6B',土:'#FFD93D',金:'#C4A882',水:'#4D96FF'};
    var highlightShen = ['日主','正印','偏印','比肩','劫财'];

    function renderPillar(name, gan, zhi, isDay) {
      var ganShen = isDay ? '日主' : calcShiShen(dayGan, gan);
      var zhiShen = calcZhiShenName(dayGan, zhi);
      var ganWX = GAN_TO_WX[gan];
      var zhiWX = ZHI_TO_WX[zhi];
      var gColor = plColors[ganWX] || '#C4A882';
      var zColor = plColors[zhiWX] || '#C4A882';
      var isHL = highlightShen.indexOf(ganShen) !== -1;
      var ganSize = isDay ? '30px' : '26px';

      return '<div class="pillar-col' + (isDay ? ' pillar-day' : '') + '">' +
        '<div class="pillar-name">' + name + '</div>' +
        // 天干块
        '<div class="gan-block" style="background:' + gColor + '22;border:1.5px solid ' + gColor + '66;border-radius:10px;padding:8px 0;margin-bottom:4px;text-align:center;' + (isDay ? 'border-width:2px;box-shadow:0 2px 8px ' + gColor + '44;' : '') + '">' +
          '<div style="font-family:\'Ma Shan Zheng\',cursive;font-size:' + ganSize + ';color:' + gColor + ';line-height:1;">' + gan + '</div>' +
          '<div style="font-size:9px;color:' + gColor + ';margin-top:3px;font-weight:500;">' + ganWX + '</div>' +
          '<div style="font-size:9px;margin-top:2px;padding:1px 6px;border-radius:100px;display:inline-block;background:' + (isHL ? gColor + '33' : '#F5E0C8') + ';color:' + (isHL ? gColor : '#A8917A') + ';font-weight:' + (isHL ? '500' : '400') + ';">' + ganShen + '</div>' +
        '</div>' +
        // 地支块
        '<div class="zhi-block" style="background:' + zColor + '18;border:1px solid ' + zColor + '44;border-radius:10px;padding:8px 0;text-align:center;">' +
          '<div style="font-family:\'Ma Shan Zheng\',cursive;font-size:26px;color:' + zColor + ';line-height:1;">' + zhi + '</div>' +
          '<div style="font-size:9px;color:' + zColor + ';margin-top:3px;font-weight:500;">' + zhiWX + '</div>' +
          '<div style="font-size:9px;margin-top:2px;padding:1px 6px;border-radius:100px;display:inline-block;background:#F5E0C8;color:#A8917A;">' + zhiShen + '</div>' +
        '</div>' +
      '</div>';
    }

    function renderPillarPlaceholder(name) {
      return '<div class="pillar-col pillar-placeholder">' +
        '<div class="pillar-name">' + name + '</div>' +
        '<div class="bazi-placeholder">' +
          '<span class="bazi-placeholder-gan">?</span>' +
          '<span class="bazi-placeholder-zhi">?</span>' +
          '<span class="bazi-placeholder-hint">待填</span>' +
        '</div>' +
      '</div>';
    }

    var pillarsColsHtml =
      renderPillar('年柱', baziData.year.gan, baziData.year.zhi, false) +
      renderPillar('月柱', baziData.month.gan, baziData.month.zhi, false) +
      renderPillar('日柱', baziData.day.gan, baziData.day.zhi, true) +
      (hasHour ? renderPillar('时柱', baziData.hour.gan, baziData.hour.zhi, false) : renderPillarPlaceholder('时柱'));

    var pillarsHtml =
      '<div class="section-header anim-fade-up">' +
        '<span class="section-icon" style="background:#9B72CF;">☰</span>' +
        '<span class="section-title">八字四柱排盘</span>' +
      '</div>' +
      '<div class="card anim-fade-up">' +
        '<div class="bazi-pillars-row">' + pillarsColsHtml + '</div>' +
        '<p class="bazi-daymaster">日主：<strong>' + baziData.dayMaster + '</strong>（' + dayMasterWX + '）</p>' +
        (hasHour ? '' : '<div class="bazi-hour-warning">⚠️ 未填写时辰，当前显示年月日三柱，排盘准确度约85%</div>') +
      '</div>';

    // 2. Wu Xing bars
    var wuxingHtml = '';
    for (var wj = 0; wj < wxOrder.length; wj++) {
      var wx = wxOrder[wj];
      var count = wuXingData.count[wx];
      var pct = Math.round(count / maxCount * 100);
      var tagHtml = '';
      if (count === 0) tagHtml = '<span class="wuxing-tag missing">缺</span>';
      else if (count >= 3) tagHtml = '<span class="wuxing-tag strong">旺</span>';
      wuxingHtml +=
        '<div class="wuxing-row">' +
          '<span class="wuxing-label">' + wx + '</span>' +
          '<div class="wuxing-bar-track"><div class="wuxing-bar-fill" style="width:' + pct + '%;background:' + (wxColors[wx] || '#6BCB77') + ';"></div></div>' +
          '<span class="wuxing-count">' + count + '</span>' +
          (tagHtml || '<span style="width:42px;flex-shrink:0;"></span>') +
        '</div>';
    }

    var wuxingSection =
      '<div class="section-header anim-fade-up" style="margin-top:4px;">' +
        '<span class="section-icon" style="background:#6BCB77;">☯</span>' +
        '<span class="section-title">五行能量分布</span>' +
      '</div>' +
      '<div class="card anim-fade-up">' + wuxingHtml + '</div>';

    // 2.5 身强身弱 + 喜忌
    var strengthSection = '';
    if (strengthData && xijiData) {
      var avatarSvg = (typeof baziAvatars !== 'undefined' && baziAvatars[baziAvatarKey]) ? baziAvatars[baziAvatarKey] : '';
      // hex to rgba at 10%
      var hex = dayWxColor.replace('#', '');
      var r = parseInt(hex.substring(0,2), 16);
      var g = parseInt(hex.substring(2,4), 16);
      var b = parseInt(hex.substring(4,6), 16);
      var cardBg = 'rgba(' + r + ',' + g + ',' + b + ',0.1)';

      var xiTagsHtml = '';
      for (var xi = 0; xi < xijiData.xi.length; xi++) {
        var item = xijiData.xi[xi];
        xiTagsHtml += '<span class="bazi-xiji-tag xi">' + item.emoji + ' ' + item.wx + '</span>';
      }
      var jiTagsHtml = '';
      for (var ji = 0; ji < xijiData.ji.length; ji++) {
        var jitem = xijiData.ji[ji];
        jiTagsHtml += '<span class="bazi-xiji-tag ji">' + jitem.emoji + ' ' + jitem.wx + '</span>';
      }

      // Build the meaning text
      var xiNames = xijiData.xi.map(function(it) { return it.wx; }).join('、');
      var strengthDesc = strengthData.isStrong
        ? '能量充足，需要流动和释放。多给孩子自由探索的空间，在运动、表达、创造中释放能量。'
        : '能量偏弱，需要滋养和支撑。给孩子创造一个温暖、有安全感的环境，让他慢慢积累成长的底气。';

      strengthSection =
        '<div class="section-header anim-fade-up" style="margin-top:4px;">' +
          '<span class="section-icon" style="background:#9B72CF;">⚖</span>' +
          '<span class="section-title">身强身弱 · 喜用神</span>' +
        '</div>' +
        '<div class="card anim-fade-up bazi-strength-card" style="background:' + cardBg + ';">' +
          (avatarSvg ? '<div class="bazi-strength-avatar">' + avatarSvg + '</div>' : '') +
          '<div class="bazi-strength-label">' + baziData.dayMaster + dayMasterWX + '日主 · ' + strengthData.level + '</div>' +
          '<div class="bazi-strength-desc">' + strengthData.desc + '</div>' +
          '<div class="bazi-xiji-divider"></div>' +
          '<div class="bazi-xiji-row">' +
            '<span class="bazi-xiji-row-label">喜用神</span>' +
            '<div class="bazi-xiji-tags">' + xiTagsHtml + '</div>' +
          '</div>' +
          '<div class="bazi-xiji-row">' +
            '<span class="bazi-xiji-row-label">忌神</span>' +
            '<div class="bazi-xiji-tags">' + jiTagsHtml + '</div>' +
          '</div>' +
          '<p class="bazi-xiji-meaning">' +
            '<strong>' + childName + '</strong>喜<strong>' + xiNames + '</strong>的能量，' +
            strengthDesc +
          '</p>' +
        '</div>';
    }

    // 3. GeJu
    var gejuSection =
      '<div class="section-header anim-fade-up" style="margin-top:4px;">' +
        '<span class="section-icon" style="background:#C77DFF;">◇</span>' +
        '<span class="section-title">八字格局</span>' +
      '</div>' +
      '<div class="card anim-fade-up" style="text-align:center;">' +
        '<div class="geju-badge">' + gejuData.name + '</div>' +
        '<p class="geju-desc">' + gejuData.desc + '</p>' +
        '<div class="geju-tip">💡 ' + gejuData.tip + '</div>' +
      '</div>';

    // 4. BaZi-Life Number link
    var linkHtml = '';
    if (baziLinks.length > 0) {
      linkHtml +=
        '<div class="section-header anim-fade-up" style="margin-top:4px;">' +
          '<span class="section-icon" style="background:#FF9F43;">🔗</span>' +
          '<span class="section-title">八字与生命数字联动</span>' +
        '</div>' +
        '<div class="card anim-fade-up">';

      for (var li = 0; li < baziLinks.length; li++) {
        var link = baziLinks[li];
        if (link.isDoubleConfirm) {
          linkHtml +=
            '<div class="bazi-link-double">' +
              '<span class="double-badge">双重印证</span>' +
              '<p class="double-text">' + genBaziLink(childName, link.wuXing, link.numbers, true, childGender) + '</p>' +
            '</div>';
        } else {
          linkHtml +=
            '<div class="bazi-link-item">' +
              '<p class="bazi-link-general">' + genBaziLink(childName, link.wuXing, link.numbers, false, childGender) + '</p>' +
            '</div>';
        }
      }
      linkHtml += '</div>';
    }

    var notesHtml =
      '<p class="bazi-notes">📌 八字排盘基于<span style="color:var(--text-primary);">Solar→Lunar→EightChar</span>路径计算，对照 <span style="color:var(--text-primary);">suanming.com</span>、<span style="color:var(--text-primary);">eqbz.com</span> 验算一致。' +
      '如果排盘结果与已知八字不符，请检查输入的出生时辰是否准确——时辰对日柱和时柱都有影响。</p>';

    section.innerHTML = pillarsHtml + wuxingSection + strengthSection + gejuSection + linkHtml + notesHtml;
  })();

  // ═══ Personality ═══
  var deepPersonality = (typeof genStrengths === 'function')
    ? genStrengths(childName, childGender, lifeNum, dayMasterWX)
    : '';
  document.getElementById('personalityText').textContent = deepPersonality || content.personality;

  // ═══ Strengths ═══
  (function renderStrengths() {
    // Use deepContent genStrengths as the single rich paragraph
    var deepStr = (typeof genStrengths === 'function')
      ? genStrengths(childName, childGender, lifeNum, dayMasterWX)
      : '';
    if (deepStr) {
      document.getElementById('strengthList').innerHTML =
        '<li style="list-style:none;padding:0;">' +
          '<p class="body-text" style="margin:0;line-height:1.8;">' + deepStr + '</p>' +
        '</li>';
    } else {
      var strengths = content.strengths || [];
      var dotColors = [iconColor, '#FF9F43', '#6BCB77'];
      var strengthHtml = '';
      for (var i = 0; i < strengths.length; i++) {
        strengthHtml += '<li><span class="strength-dot" style="background:' + (dotColors[i] || iconColor) + ';"></span>' + strengths[i] + '</li>';
      }
      document.getElementById('strengthList').innerHTML = strengthHtml;
    }
  })();

  // ═══ Parenting Tips → Contact Mode ═══
  (function renderContactMode() {
    var mode = (typeof genContactMode === 'function')
      ? genContactMode(childName, childGender, lifeNum, dayMasterWX)
      : null;

    if (mode) {
      var scenesHtml = '';
      for (var s = 0; s < mode.scenes.length; s++) {
        scenesHtml += '<li class="contact-scene">' + mode.scenes[s] + '</li>';
      }
      document.getElementById('tipsList').innerHTML =
        '<div class="contact-mode-card">' +
          '<p class="contact-mode-why">' + mode.reason + '</p>' +
          '<p class="contact-mode-core"><strong>' + mode.mode + '</strong></p>' +
          '<p class="contact-mode-scenes-label">今天就能用的' + mode.scenes.length + '个场景：</p>' +
          '<ol class="contact-scenes-list">' + scenesHtml + '</ol>' +
        '</div>';
    } else {
      var tips = content.parentTips || content.guidance || [];
      var tipsHtml = '';
      for (var t = 0; t < tips.length; t++) {
        tipsHtml += '<li>' + tips[t] + '</li>';
      }
      document.getElementById('tipsList').innerHTML = tipsHtml;
    }
  })();

  // ═══ Paywall ═══
  document.getElementById('btnUnlock').addEventListener('click', function() {
    alert('支付功能即将开放！请添加微信：[待填写] 告知孩子生日，手动获取完整报告');
  });

  // ═══ Finish ═══
  hideLoading();
})();
</script>
